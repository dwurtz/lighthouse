<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 176 176">
  <!--
    Lighthouse menu-bar icon v2 — simpler, inspired by David's reference:
    narrow tapered tower, beams radiating diagonally upward from the
    lantern, one subtle stripe. No ground line. No finial. Template
    image: alpha-only, black on transparent.
  -->
  <g fill="#000">
    <!-- Tapered tower body: narrow, tall, slight taper -->
    <path d="M 70 156 L 76 48 L 100 48 L 106 156 Z"/>

    <!-- Single horizontal band on the tower -->
    <rect x="72" y="100" width="32" height="10"/>

    <!-- Gallery / walkway (slightly wider than the tower top) -->
    <rect x="68" y="42" width="40" height="6"/>

    <!-- Lantern room -->
    <rect x="76" y="22" width="24" height="20"/>

    <!-- Roof — small triangle cap -->
    <path d="M 74 22 L 88 4 L 102 22 Z"/>
  </g>

  <!-- Beam rays — two per side radiating diagonally upward.
       Thick strokes with round caps so they render cleanly at 22px.
       Angles chosen so they arc away from the lantern like a real beam. -->
  <g stroke="#000" stroke-width="10" stroke-linecap="round" fill="none">
    <!-- Left beams -->
    <line x1="74" y1="30" x2="28" y2="12"/>
    <line x1="74" y1="36" x2="20" y2="40"/>
    <!-- Right beams -->
    <line x1="102" y1="30" x2="148" y2="12"/>
    <line x1="102" y1="36" x2="156" y2="40"/>
  </g>
</svg>
