name: Build & Release DMG

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -e .

      - name: Compile Swift menubar app
        run: |
          xcrun swiftc -parse-as-library \
            -framework SwiftUI -framework AppKit -framework ServiceManagement \
            -o menubar/Deja menubar/Sources/**/*.swift

      - name: Compile DejaRecorder
        run: |
          xcrun swiftc \
            -framework Foundation -framework ScreenCaptureKit \
            -framework AVFoundation -framework CoreMedia \
            -o menubar/DejaRecorder menubar/DejaRecorder.swift

      - name: Assemble app bundle
        run: |
          mkdir -p Deja.app/Contents/MacOS
          mkdir -p Deja.app/Contents/Resources
          cp menubar/Deja Deja.app/Contents/MacOS/Deja
          cp menubar/DejaRecorder Deja.app/Contents/MacOS/DejaRecorder

          # Resources
          cp Resources/tray-icon.png Deja.app/Contents/Resources/
          cp Resources/AppIcon.icns Deja.app/Contents/Resources/

          # Bundle Python environment
          bash menubar/bundle-python.sh

      - name: Ad-hoc codesign
        run: codesign --force --sign - --deep Deja.app

      - name: Create DMG
        run: |
          hdiutil create -volname "Deja" \
            -srcfolder Deja.app \
            -ov -format UDZO \
            Deja.dmg

      - name: Upload DMG as artifact (every push)
        uses: actions/upload-artifact@v4
        with:
          name: Deja.dmg
          path: Deja.dmg

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Deja.dmg
