name: Build & Release DMG

on:
  push:
    branches: [main]
    tags: ['v*']
    # Only trigger when files that actually affect the build change.
    # Docs / appcast / .md churn shouldn't burn macOS-runner minutes
    # (10x multiplier). Tag pushes ignore paths and always build.
    paths:
      - 'menubar/**'
      - 'src/**'
      - 'pyproject.toml'
      - 'Deja*.plist'
      - 'Deja.xcodeproj/**'
      - '.github/workflows/release.yml'

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: write   # needed to create the GitHub release + upload DMG
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install Python dependencies
        run: |
          python -m venv venv
          source venv/bin/activate
          pip install -e .

      - name: Build Deja.app via Xcode
        run: |
          # Use xcodebuild so Swift Package Manager resolves Sparkle
          # (and any other SPM deps the Xcode project declares). Raw
          # swiftc misses SPM entirely, which is why this step used
          # to fail with "no such module 'Sparkle'".
          #
          # Override signing to ad-hoc — the project's default
          # CODE_SIGN_IDENTITY is the local "Deja Dev" cert which
          # lives in a dev machine's Keychain, not on CI runners.
          # The Ad-hoc codesign step below re-signs with `-` anyway.
          xcodebuild -project Deja.xcodeproj \
            -scheme Deja \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

          # Copy the built .app to the repo root where subsequent
          # steps (codesign, DMG) expect it.
          cp -R build/Build/Products/Release/Deja.app ./Deja.app

          # Bundle the Python environment into the app
          bash menubar/bundle-python.sh

      - name: Ad-hoc codesign
        run: codesign --force --sign - --deep Deja.app

      - name: Create DMG
        run: |
          hdiutil create -volname "Deja" \
            -srcfolder Deja.app \
            -ov -format UDZO \
            Deja.dmg

      - name: Upload DMG as artifact (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Deja.dmg
          path: Deja.dmg
          retention-days: 30

      - name: Sign DMG for Sparkle and update appcast
        if: startsWith(github.ref, 'refs/tags/v') && env.SPARKLE_KEY != ''
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_ED25519_KEY }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          FILE_SIZE=$(stat -f%z Deja.dmg)
          DOWNLOAD_URL="https://github.com/dwurtz/deja/releases/download/v${VERSION}/Deja.dmg"
          PUB_DATE=$(date -u '+%a, %d %b %Y %H:%M:%S +0000')

          # Download Sparkle tools
          curl -sL https://github.com/sparkle-project/Sparkle/releases/download/2.6.0/Sparkle-2.6.0.tar.xz -o sparkle.tar.xz
          mkdir sparkle-tools && tar xf sparkle.tar.xz -C sparkle-tools

          # Sign the DMG with Ed25519
          SIGNATURE=$(echo "$SPARKLE_KEY" | sparkle-tools/bin/sign_update Deja.dmg)

          # Build the new appcast entry (heredoc body must stay
          # indented inside the YAML run block; shell strips the
          # leading whitespace via <<- once a tab is used. Simpler:
          # keep uniform indentation and live with the whitespace in
          # the emitted XML — sed picks it up fine.)
          ENTRY=$(cat <<APPCAST_EOF
          <item>
            <title>Version ${VERSION}</title>
            <sparkle:version>${VERSION}</sparkle:version>
            <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
            <sparkle:minimumSystemVersion>14.0</sparkle:minimumSystemVersion>
            <pubDate>${PUB_DATE}</pubDate>
            <enclosure
              url="${DOWNLOAD_URL}"
              type="application/x-apple-diskimage"
              ${SIGNATURE}
              length="${FILE_SIZE}"
            />
          </item>
          APPCAST_EOF
          )

          # Insert the new entry into appcast.xml (before closing </channel>)
          sed -i '' "s|</channel>|${ENTRY}\n  </channel>|" site/appcast.xml

          echo "Appcast updated for v${VERSION}"
          cat site/appcast.xml

      - name: Commit updated appcast
        if: startsWith(github.ref, 'refs/tags/v') && env.SPARKLE_KEY != ''
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_ED25519_KEY }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/appcast.xml
          git commit -m "release: update appcast.xml for v${GITHUB_REF#refs/tags/v}" || true
          git push origin HEAD:main || true

      - name: Create GitHub Release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: Deja.dmg
