name: Deja
options:
  bundleIdPrefix: com.deja
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  minimumXcodeGenVersion: "2.35"

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle.git
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  Deja:
    type: application
    platform: macOS
    sources:
      - path: menubar/Sources
      - path: Resources/AppIcon.icns
        type: file
        buildPhase: resources
      - path: Resources/tray-icon.png
        type: file
        buildPhase: resources
      - path: Resources/client_secret.json
        type: file
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.deja.app
        CODE_SIGN_IDENTITY: "Deja Dev"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.0"
        INFOPLIST_KEY_LSUIElement: true
        PRODUCT_NAME: Deja
        CODE_SIGN_ENTITLEMENTS: Deja.entitlements
    info:
      path: Deja-Info.plist
      properties:
        CFBundleExecutable: Deja
        CFBundleIdentifier: com.deja.app
        CFBundleName: "Déjà"
        CFBundleDisplayName: "Déjà"
        CFBundleVersion: "0.2.0"
        CFBundleShortVersionString: "0.2.0"
        CFBundleIconFile: AppIcon
        LSUIElement: true
        NSMicrophoneUsageDescription: "Déjà uses the microphone to transcribe voice notes when you hit Listen in the popover."
    dependencies:
      - target: DejaRecorder
        copy:
          destination: executables
      - package: Sparkle
        product: Sparkle
      - sdk: AppKit.framework
      - sdk: Foundation.framework
      - sdk: SwiftUI.framework
      - sdk: CoreGraphics.framework
      - sdk: ImageIO.framework
      - sdk: ScreenCaptureKit.framework
      - sdk: ServiceManagement.framework
      - sdk: AVFoundation.framework
      - sdk: libsqlite3.tbd
    postBuildScripts:
      - name: "Bundle Python Environment"
        script: |
          cd "${PROJECT_DIR}"
          if [ -f "menubar/bundle-python.sh" ]; then
            bash menubar/bundle-python.sh
          fi
        basedOnDependencyAnalysis: false

  DejaRecorder:
    type: tool
    platform: macOS
    sources:
      - path: menubar/DejaRecorder.swift
    settings:
      base:
        CODE_SIGN_IDENTITY: "Deja Dev"
        CODE_SIGN_STYLE: Manual
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        SWIFT_VERSION: "5.0"
        PRODUCT_NAME: DejaRecorder
    dependencies:
      - sdk: Foundation.framework
      - sdk: ScreenCaptureKit.framework
      - sdk: AVFoundation.framework
      - sdk: CoreMedia.framework
