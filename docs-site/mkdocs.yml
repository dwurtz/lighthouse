site_name: Deja — How It Works
site_description: A teaching walkthrough of Deja, a local-first personal chief of staff for macOS.
site_author: David Wurtz
repo_url: https://github.com/dwurtz/deja
repo_name: dwurtz/deja
edit_uri: ""

docs_dir: docs

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  icon:
    repo: fontawesome/brands/github

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dwurtz/deja
  generator: false

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

nav:
  - Intro:
      - What is Deja?: index.md
      - Quickstart: quickstart.md
  - Architecture:
      - The three pipelines: pipelines.md
      - The wiki: wiki.md
      - 'goals.md — the working ledger': goals-file.md
      - Chief of Staff: cos.md
      - Signal sources: signals.md
      - MCP tool surface: mcp.md
  - In practice:
      - A day in the life: day-in-the-life.md
  - Principles:
      - Design principles: principles.md
  - Reference:
      - Glossary: glossary.md

copyright: Built for a small, trusted audience. Treat what you see here as an early technical preview.
